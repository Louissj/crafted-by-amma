name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR }}

            # Check if package.json changed before pulling
            git fetch origin main
            CHANGED=$(git diff HEAD origin/main --name-only)

            git pull origin main

            # Install deps only if package.json or package-lock.json changed
            if echo "$CHANGED" | grep -qE "package(-lock)?\.json"; then
              echo "📦 package.json changed — running npm install"
              npm install --production=false
            else
              echo "⚡ No dependency changes — skipping npm install"
            fi

            npm run build
            pm2 restart ${{ secrets.PM2_APP_NAME }} --update-env
            pm2 save
            echo "✅ Deploy complete"
